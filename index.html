// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

body {

@keyframes pulse-dot {

}

.typing-dot {

.typing-dot:nth-child(2) { animation-delay: 0.2s; }

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(20px); }

@keyframes slideInLeft {

  to { opacity: 1; transform: translateX(0); }

.animate-slide-right {

.status-dot {

#messages-container {

<body class="text-white min-h-screen flex flex-col overflow-hidden">
  <!-- Header -->
  <header class="glass-strong border-b border-white/10 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#007FFF] to-[#0057b8] flex items-center justify-center shadow-lg shadow-blue-500/30">
        <i class="fa-solid fa-brain text-white text-lg"></i>
      </div>

          <span id="status-dot" class="status-dot w-2 h-2 rounded-full bg-green-400"></span>

    <button id="export-pdf" class="glass px-3 py-2 md:px-4 rounded-lg text-sm font-medium hover:bg-white/10 transition-all duration-200 flex items-center gap-2 active:scale-95">

  <!-- Chat Container -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Messages Area -->
    <div id="messages-container" class="flex-1 overflow-y-auto px-3 py-4 md:px-6 space-y-4">
      <div id="messages-list" class="max-w-4xl mx-auto space-y-4">
        <!-- Messages will be injected here -->
        <div id="empty-state" class="flex flex-col items-center justify-center h-full min-h-[60vh] text-center px-4">
          <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-[#007FFF] to-[#0057b8] flex items-center justify-center mb-4 shadow-xl shadow-blue-500/20">

          </div>
          <h2 class="text-xl font-bold mb-2">Bienvenue sur XAI</h2>

        </div>

      <!-- Loading Skeleton -->
      <div id="loading-skeleton" class="hidden max-w-4xl mx-auto animate-slide-left">

            <div class="flex gap-1.5">
              <span class="typing-dot w-2 h-2 bg-gray-400 rounded-full"></span>
              <span class="typing-dot w-2 h-2 bg-gray-400 rounded-full"></span>

    <!-- Error Banner -->
    <div id="error-banner" class="hidden bg-gradient-to-r from-red-500/20 to-red-600/20 border-y border-red-500/30 px-4 py-3 backdrop-blur-md">
      <div class="max-w-4xl mx-auto flex items-center gap-3">
        <i class="fa-solid fa-triangle-exclamation text-red-400"></i>

    <!-- Input Area -->
    <div class="glass-strong border-t border-white/10 px-3 py-3 md:px-6 safe-bottom">

          <div class="flex-1 relative">
            <textarea 
              id="message-input"
              placeholder="Pose ta question..."
              rows="1"
              class="w-full glass rounded-2xl px-4 py-3 pr-12 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#007FFF]/50 transition-all resize-none max-h-32"

          <button 
            type="submit"
            id="send-button"
            class="bg-gradient-to-br from-[#007FFF] to-[#0057b8] w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:scale-105 active:scale-95 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
          >
            <i class="fa-solid fa-paper-plane text-white"></i>
          </button>
        </form>
        <p class="text-[10px] text-gray-500 mt-2 text-center px-2">

<script>
const API_BASE = 'https://xai-fawn-delta.vercel.app';
const messagesContainer = document.getElementById('messages-container');
const messagesList = document.getElementById('messages-list');
const emptyState = document.getElementById('empty-state');
const chatForm = document.getElementById('chat-form');
const messageInput = document.getElementById('message-input');
const sendButton = document.getElementById('send-button');
const loadingSkeleton = document.getElementById('loading-skeleton');
const errorBanner = document.getElementById('error-banner');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const exportBtn = document.getElementById('export-pdf');
const clearInputBtn = document.getElementById('clear-input');

let conversationHistory = [];
let isLoading = false;

// Auto-resize textarea
messageInput.addEventListener('input', () => {
  messageInput.style.height = 'auto';
  messageInput.style.height = messageInput.scrollHeight + 'px';
  
  if (messageInput.value.trim()) {
    clearInputBtn.classList.remove('hidden');
    sendButton.disabled = false;
  } else {
    clearInputBtn.classList.add('hidden');
    sendButton.disabled = false;
  }
});

clearInputBtn.addEventListener('click', () => {
  messageInput.value = '';
  messageInput.style.height = 'auto';
  clearInputBtn.classList.add('hidden');
  messageInput.focus();
});

// Send on Enter, new line on Shift+Enter
messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    chatForm.dispatchEvent(new Event('submit'));
  }
});

function setStatus(online) {
  console.log("STATUS:", online);

  if (online) {
    statusDot.classList.remove('bg-red-400');
    statusDot.classList.add('bg-green-400');
    statusText.textContent = 'En ligne';
    errorBanner.classList.add('hidden');
  } else {
    statusDot.classList.remove('bg-green-400');
    statusDot.classList.add('bg-red-400');
    statusText.textContent = 'Hors ligne';
  }
}

function scrollToBottom() {
  setTimeout(() => {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }, 100);
}

function formatTime(date) {
  const d = new Date(date);
  return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function createMessageElement(msg, isUser) {
  const wrapper = document.createElement('div');
  wrapper.className = `flex gap-3 items-start ${isUser ? 'flex-row-reverse animate-slide-right' : 'animate-slide-left'}`;
  
  const avatar = document.createElement('div');
  avatar.className = 'w-8 h-8 rounded-lg glass flex items-center justify-center flex-shrink-0 mt-1';
  avatar.innerHTML = isUser 
    ? '<i class="fa-solid fa-user text-xs"></i>' 
    : '<i class="fa-solid fa-robot text-xs text-[#007FFF]"></i>';
  
  const content = document.createElement('div');
  content.className = 'flex flex-col gap-1 max-w-[75%] md:max-w-[70%]';
  
  const bubble = document.createElement('div');
  bubble.className = `${isUser ? 'message-user' : 'message-ai'} px-4 py-2.5 ${isUser ? 'rounded-2xl rounded-tr-sm' : 'rounded-2xl rounded-tl-sm'}`;
  
  const text = document.createElement('p');
  text.className = 'text-sm leading-relaxed whitespace-pre-wrap break-words';
  text.textContent = msg.content || msg.message || '';
  
  const time = document.createElement('span');
  time.className = `text-[10px] text-gray-400 px-1 ${isUser ? 'text-right' : 'text-left'}`;
  time.textContent = formatTime(msg.timestamp || Date.now());
  
  bubble.appendChild(text);
  content.appendChild(bubble);
  content.appendChild(time);
  wrapper.appendChild(avatar);
  wrapper.appendChild(content);
  
  return wrapper;
}

function renderMessages() {
  if (conversationHistory.length === 0) {
    emptyState.classList.remove('hidden');
    return;
  }
  
  emptyState.classList.add('hidden');
  messagesList.innerHTML = '';
  
  conversationHistory.forEach(msg => {
    const isUser = msg.role === 'user' || msg.sender === 'user';
    messagesList.appendChild(createMessageElement(msg, isUser));
  });
  
  scrollToBottom();
}

async function loadHistory() {
  try {
    const response = await fetch(`${API_BASE}/api/chat/history`);
    if (!response.ok) throw new Error('History fetch failed');
    
    const data = await response.json();
    conversationHistory = Array.isArray(data) ? data : data.messages || data.history || [];
    renderMessages();
    setStatus(true);
  } catch (error) {
    console.error('Erreur chargement historique:', error);
    setStatus(false);
  }
}

async function sendMessage(message) {
  if (isLoading || !message.trim()) return;
  
  isLoading = true;
  sendButton.disabled = true;
  messageInput.disabled = true;
  
  // Add user message to UI immediately
  const userMsg = { role: 'user', content: message, timestamp: Date.now() };
  conversationHistory.push(userMsg);
  renderMessages();
  
  // Show loading
  emptyState.classList.add('hidden');
  loadingSkeleton.classList.remove('hidden');
  scrollToBottom();
  
  try {
    
const response = await fetch(`${API_BASE}/api/xai_chat`, {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json',
  },
  body: JSON.stringify({ message })
});

// Lire la réponse en texte brut d'abord
const text = await response.text();

console.log("STATUS:", response.status);
console.log("RAW RESPONSE:", text);

if (!response.ok) {
  throw new Error(text);
}

// Transformer en JSON seulement si c'est valide
let data;
try {
  data = JSON.parse(text);
} catch (e) {
  throw new Error("Réponse backend invalide JSON: " + text);
}

// Adapter la réponse IA
const aiContent =
  data.response ||
  data.message ||
  data.reply ||
  data.content ||
  "Réponse reçue";

const aiMsg = {
  role: 'assistant',
  content: aiContent,
  timestamp: Date.now()
};

conversationHistory.push(aiMsg);
  } catch (error) {
    console.error('Erreur envoi message:', error);
    setStatus(false);
    errorBanner.classList.remove('hidden');
    
    const errorMsg = { 
      role: 'assistant', 
      content: 'XAI indisponible. Impossible de traiter ta demande pour le moment.', 
      timestamp: Date.now() 
    };
    conversationHistory.push(errorMsg);
  } finally {
    loadingSkeleton.classList.add('hidden');
    isLoading = false;
    sendButton.disabled = false;
    messageInput.disabled = false;
    messageInput.focus();
    renderMessages();
  }
}

chatForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const message = messageInput.value.trim();
  if (message) {
    sendMessage(message);
    messageInput.value = '';
    messageInput.style.height = 'auto';
    clearInputBtn.classList.add('hidden');
  }
});

exportBtn.addEventListener('click', () => {
  if (conversationHistory.length === 0) {
    alert('Aucune conversation à exporter');
    return;
  }
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  
  doc.setFontSize(18);
  doc.setTextColor(0, 127, 255);
  doc.text('XAI - Conversation', 14, 20);
  
  doc.setFontSize(10);
  doc.setTextColor(100);
  doc.text(`Exporté le ${new Date().toLocaleDateString('fr-FR')}`, 14, 28);
  
  let y = 40;
  doc.setFontSize(11);
  doc.setTextColor(0);
  
  conversationHistory.forEach(msg => {
    const isUser = msg.role === 'user' || msg.sender === 'user';
    const prefix = isUser ? 'Vous: ' : 'XAI: ';
    const text = prefix + (msg.content || msg.message || '');
    const lines = doc.splitTextToSize(text, 180);
    
    if (y + lines.length * 7 > 280) {
      doc.addPage();
      y = 20;
    }
    
    doc.setTextColor(isUser ? 0 : 0, isUser ? 127 : 0, isUser ? 255 : 0);
    doc.text(lines, 14, y);
    y += lines.length * 7 + 5;
  });
  
  doc.save(`XAI-conversation-${Date.now()}.pdf`);
});

// Load history on start
loadHistory();

// Retry connection every 10s if offline
setInterval(() => {
  if (statusDot.classList.contains('bg-red-400')) {
    loadHistory();
  }
}, 10000);
</script>
